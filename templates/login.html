<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Crop Recommendation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(rgba(10, 42, 18, 0.8), rgba(20, 52, 28, 0.9)), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #1a202c;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .input-group input:focus {
            border-color: #2ecc71;
            background: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
        }

        .btn-google {
            background: #ffffff;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e0;
        }

        .btn-phone {
            background: #3182ce;
            color: white;
        }

        .btn-phone:hover {
            background: #2b6cb0;
        }

        .icon {
            width: 20px;
            height: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #27ae60;
        }

        /* Phone OTP Section */
        #otpSection {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f0f9ff;
            border-radius: 12px;
            border: 1px solid #bae6fd;
        }

        #recaptcha-container {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #dcfce3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">🌾</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your farm dashboard</p>

        <div id="alertBox" class="alert"></div>

        <!-- Traditional Email Login Form -->
        <form id="emailLoginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="farmer@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="emailLoginBtn">
                Sign In securely
            </button>
        </form>

        <div class="divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <button class="btn btn-google" id="googleLoginBtn">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>

        <button class="btn btn-phone" id="phoneLoginBtn">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            Sign in with Mobile
        </button>

        <!-- OTP Section (Hidden initially) -->
        <div id="otpSection">
            <div id="recaptcha-container"></div>
            <div class="input-group">
                <label for="phoneNumber">Mobile Number (with +91)</label>
                <input type="tel" id="phoneNumber" placeholder="+91 9999999999">
            </div>
            <button class="btn btn-primary" id="sendOtpBtn">Send OTP</button>
            
            <div id="otpVerificationDiv" style="display: none; margin-top: 15px;">
                <div class="input-group">
                    <label for="otpCode">Verification Code</label>
                    <input type="text" id="otpCode" placeholder="123456">
                </div>
                <button class="btn btn-primary" id="verifyOtpBtn">Verify & Login</button>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <!-- Firebase SDK Setup (Using compat version for simplicity in standard HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // ==========================================
        // DEPLOYMENT TIP: Replace this config with your actual Firebase Project config
        // 1. Go to Firebase Console (console.firebase.google.com)
        // 2. Create a Project -> Add Web App
        // 3. Enable Authentication (Email/Password, Google, Phone)
        // 4. Paste the config object below
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDNBozU1zlLKYFnkM2peZIpG14th36QUYE",
            authDomain: "crop-recommendation-985e6.firebaseapp.com",
            projectId: "crop-recommendation-985e6",
            storageBucket: "crop-recommendation-985e6.firebasestorage.app",
            messagingSenderId: "670274660448",
            appId: "1:670274660448:web:4b19abf327e6183904bb05",
            measurementId: "G-7Z65D99XFH"
        };

        // Initialize Firebase (only if config is set, otherwise show demo messages)
        let isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_FIREBASE_API_KEY";
        
        if (isFirebaseConfigured) {
            firebase.initializeApp(firebaseConfig);
        }

        // UI Elements
        const alertBox = document.getElementById('alertBox');
        const emailForm = document.getElementById('emailLoginForm');
        const googleBtn = document.getElementById('googleLoginBtn');
        const phoneBtn = document.getElementById('phoneLoginBtn');
        const otpSection = document.getElementById('otpSection');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const otpVerificationDiv = document.getElementById('otpVerificationDiv');

        function showAlert(message, isError = true) {
            alertBox.style.display = 'block';
            alertBox.textContent = message;
            alertBox.className = isError ? 'alert alert-error' : 'alert alert-success';
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
        }

        function handleLoginSuccess(user) {
            showAlert(`Welcome, ${user.email || user.phoneNumber || 'Farmer'}!`, false);
            // Save login state to localStorage for the frontend to know
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', user.displayName || user.email || user.phoneNumber);
            setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
        }

        // 1. Email & Password Login
        emailForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!isFirebaseConfigured) {
                // Mock Login for demo
                showAlert('Demo Mode: Logged in successfully!', false);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', email);
                setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
                return;
            }

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    handleLoginSuccess(userCredential.user);
                })
                .catch((error) => {
                    // Try to sign up if account doesn't exist
                    if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                        firebase.auth().createUserWithEmailAndPassword(email, password)
                            .then(cred => handleLoginSuccess(cred.user))
                            .catch(err => {
                                if (err.code === 'auth/email-already-in-use') {
                                    showAlert("Incorrect password. This email is already registered.");
                                } else {
                                    showAlert(err.message);
                                }
                            });
                    } else {
                        showAlert(error.message);
                    }
                });
        });

        // 2. Google Login
        googleBtn.addEventListener('click', () => {
            if (!isFirebaseConfigured) {
                showAlert('Setup Firebase config in login.html to use Google Auth', true);
                return;
            }

            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    handleLoginSuccess(result.user);
                })
                .catch((error) => {
                    showAlert(error.message);
                });
        });

        // 3. Phone Login Toggle
        phoneBtn.addEventListener('click', () => {
            otpSection.style.display = otpSection.style.display === 'block' ? 'none' : 'block';
            if (isFirebaseConfigured && !window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                    'size': 'normal',
                    'callback': (response) => {
                        // reCAPTCHA solved, allow signInWithPhoneNumber.
                    }
                });
                window.recaptchaVerifier.render();
            }
        });

        // Send OTP
        sendOtpBtn.addEventListener('click', () => {
            const phoneNumber = document.getElementById('phoneNumber').value;
            if (!phoneNumber) {
                showAlert("Please enter phone number");
                return;
            }

            if (!isFirebaseConfigured) {
                showAlert("Demo Mode: Assuming OTP is 123456", false);
                otpVerificationDiv.style.display = 'block';
                return;
            }

            const appVerifier = window.recaptchaVerifier;
            firebase.auth().signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    otpVerificationDiv.style.display = 'block';
                    showAlert("OTP Sent successfully!", false);
                }).catch((error) => {
                    showAlert("Error sending OTP: " + error.message);
                });
        });

        // Verify OTP
        verifyOtpBtn.addEventListener('click', () => {
            const code = document.getElementById('otpCode').value;
            
            if (!isFirebaseConfigured) {
                if (code === '123456') {
                    handleLoginSuccess({ phoneNumber: document.getElementById('phoneNumber').value });
                } else {
                    showAlert("Demo Mode: Invalid OTP. Use 123456");
                }
                return;
            }

            window.confirmationResult.confirm(code).then((result) => {
                handleLoginSuccess(result.user);
            }).catch((error) => {
                showAlert("Invalid OTP code");
            });
        });
    </script>
</body>
</html>
